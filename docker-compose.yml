services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ${REPO_PATH}:/repo
      - ${SKILLS_PATH}:/skills
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdd}
      POSTGRES_DB: ${POSTGRES_DB:-sdd}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sdd}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
